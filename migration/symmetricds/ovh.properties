# SymmetricDS - noeud OVH (10.8.0.6) = noeud secondaire
# A placer dans <symmetricds>/engines/ovh.properties sur le serveur OVH.
# SymmetricDS se connecte au PG LOCAL (localhost).

engine.name=erp-ovh
group.id=erp
external.id=ovh

# URL de synchro de CE noeud (joignable par l'interne via le VPN)
sync.url=http://10.8.0.6:31415/sync
# Pointe vers le serveur d'enregistrement (interne) pour s'enregistrer
registration.url=http://192.168.1.203:31415/sync

db.driver=org.postgresql.Driver
# currentSchema=symmetricds : les tables sym_* vont dans ce schema (erp_user
# ne peut pas ecrire dans public sous PG15+). Schema a creer au prealable.
db.url=jdbc:postgresql://localhost:5432/erp_db?currentSchema=symmetricds
db.user=erp_user
db.password=CHANGEME
