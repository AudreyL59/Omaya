# SymmetricDS - noeud INTERNE (192.168.1.203) = serveur d'enregistrement (primaire)
# A placer dans <symmetricds>/engines/interne.properties sur le serveur interne.
# SymmetricDS se connecte au PG LOCAL (localhost).

engine.name=erp-interne
group.id=erp
external.id=interne

# URL de synchro de CE noeud (joignable par OVH via le VPN)
sync.url=http://192.168.1.203:31415/sync
# Noeud d'enregistrement : il EST le registre -> registration.url vide
registration.url=

db.driver=org.postgresql.Driver
# currentSchema=symmetricds : les tables sym_* vont dans ce schema (erp_user
# ne peut pas ecrire dans public sous PG15+). Schema a creer au prealable.
db.url=jdbc:postgresql://localhost:5432/erp_db?currentSchema=symmetricds
db.user=erp_user
db.password=CHANGEME

# Autorise OVH a s'enregistrer automatiquement + recharge auto
auto.registration=true
auto.reload=true

# Cadence des jobs (defaut SymmetricDS = 10s, on serre legerement).
# job.routing : collecte sym_data -> sym_outgoing_batch
# job.push    : envoie les batches au noeud cible
# job.pull    : recupere les batches du noeud cible
# job.heartbeat : ping inter-noeuds (defaut 15 min, on passe a 5 min)
job.routing.period.time.ms=5000
job.push.period.time.ms=5000
job.pull.period.time.ms=5000
job.heartbeat.period.time.ms=300000
